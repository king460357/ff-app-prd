name: PRD ↔ Test 真校验

# 每次 push / PR 自动跑 — 失败阻塞合并
on:
  push:
    branches: [main]
    paths:
      - '**/PRD/**/*.md'
      - '**/tests/**/*.ts'
      - '**/requirements-spec.md'
      - 'scripts/validate-prd-test.js'
  pull_request:
    paths:
      - '**/PRD/**/*.md'
      - '**/tests/**/*.ts'
      - '**/requirements-spec.md'

jobs:
  validate:
    runs-on: ubuntu-latest
    name: PRD ↔ Test 一致性 + 完整性校验
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Download validator script
        # 校验脚本由 product 仓维护，CI 时直接从 raw 拉
        # （或者你也可以把脚本镜像到 prd-repo 的 scripts/ 目录）
        run: |
          mkdir -p scripts
          if [ -f scripts/validate-prd-test.js ]; then
            echo "✓ 已有 validate-prd-test.js"
          else
            echo "⚠️ 校验脚本未在 prd-repo，请先 sync 一次（含脚本）"
            exit 1
          fi

      - name: Run PRD validator on all batches
        run: |
          # 遍历所有 YYYYMMDD/ 批次目录跑校验
          for batch in $(ls -d [0-9]*/ 2>/dev/null); do
            echo "═══ 校验批次 $batch ═══"
            node scripts/validate-prd-test.js "$batch" || exit 1
          done

      - name: Comment on PR with validation summary
        if: github.event_name == 'pull_request' && failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## ❌ PRD ↔ Test 校验失败

              本 PR 修改的 PRD / test 不一致。请看 [Actions 日志](${context.payload.pull_request.html_url}/checks) 详情。

              **修复指南**：
              - 如果 PRD 加了 Gherkin Scenario，对应 tests/playwright-e2e.spec.ts 也要加
              - 如果 test 加了 case，PRD 5.x.6 也要加对应 Gherkin
              - 跑 \`node scripts/validate-prd-test.js docs/{batch}\` 本地复现`
            });
